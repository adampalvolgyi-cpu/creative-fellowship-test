<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Creative Fellowship - Interactive Portfolio</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* Dynamic dark gradient background */
            background: radial-gradient(circle at 50% 50%, #2b1845 0%, #0a0510 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Prevents scrolling on mobile while dragging */
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00f3ff;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
            pointer-events: none;
            transition: opacity 0.5s ease;
            text-align: center;
        }
        #loading span {
            display: block;
            font-size: 0.8rem;
            color: #b100ff;
            margin-top: 10px;
        }
    </style>
    <!-- Import Three.js as ES Modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">
        LOADING 3D ARTIFACT...
        <span>Make sure you are running a local server!</span>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 15;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- LIGHTING (Matching the vibrant/dark aesthetic) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const cyanLight = new THREE.PointLight(0x00f3ff, 50, 20);
        cyanLight.position.set(-5, -2, 2);
        scene.add(cyanLight);

        const magentaLight = new THREE.PointLight(0xb100ff, 50, 20);
        magentaLight.position.set(5, 2, 2);
        scene.add(magentaLight);

        // --- CENTRAL MODEL ---
        const mainGroup = new THREE.Group();
        scene.add(mainGroup);
        let mainModel = null;
        
        // Intro animation states
        let introProgress = 0;
        let isIntroPlaying = true;
        mainGroup.scale.set(0.01, 0.01, 0.01);

        const loader = new GLTFLoader();
        loader.load('model.glb', function (gltf) {
            mainModel = gltf.scene;
            
            // Center the model dynamically based on its bounding box
            const box = new THREE.Box3().setFromObject(mainModel);
            const center = box.getCenter(new THREE.Vector3());
            mainModel.position.x += (mainModel.position.x - center.x);
            mainModel.position.y += (mainModel.position.y - center.y);
            mainModel.position.z += (mainModel.position.z - center.z);
            
            // Apply a default material just in case the GLB has no textures
            mainModel.traverse((child) => {
                if (child.isMesh && !child.material.map) {
                    child.material = new THREE.MeshStandardMaterial({ 
                        color: 0xdddddd, 
                        roughness: 0.7, 
                        metalness: 0.2 
                    });
                }
            });

            mainGroup.add(mainModel);
            document.getElementById('loading').style.opacity = '0'; // Hide loading text
        }, undefined, function (error) {
            console.error('Error loading model.glb. Make sure it is in the same folder and you are running a local server.', error);
            document.getElementById('loading').innerHTML = "ERROR LOADING model.glb<br><span>Check console & ensure local server is running</span>";
        });

        // --- ABSTRACT SHAPES (Representing your multidisciplinary skills) ---
        const shapes = [];
        const geometries = [
            new THREE.BoxGeometry(1, 1, 1),           // Architecture
            new THREE.IcosahedronGeometry(0.8, 0),    // Geometry/Tech
            new THREE.TorusGeometry(0.6, 0.2, 16, 32),// Design/Fluidity
            new THREE.SphereGeometry(0.7, 32, 32),    // Nature
            new THREE.DodecahedronGeometry(0.7, 0)    // Algorithmic
        ];
        
        const colors = [0x00f3ff, 0xb100ff, 0xff007f, 0x222222, 0xaaaaaa, 0x4400ff];

        for (let i = 0; i < 20; i++) {
            const geo = geometries[Math.floor(Math.random() * geometries.length)];
            const mat = new THREE.MeshPhysicalMaterial({
                color: colors[Math.floor(Math.random() * colors.length)],
                metalness: 0.1,
                roughness: 0.3,
                clearcoat: 0.8,
                clearcoatRoughness: 0.2
            });
            const mesh = new THREE.Mesh(geo, mat);

            // Random positioning around the center
            const radius = 5 + Math.random() * 8;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            
            mesh.position.x = radius * Math.sin(phi) * Math.cos(theta);
            mesh.position.y = radius * Math.sin(phi) * Math.sin(theta);
            mesh.position.z = radius * Math.cos(phi) - 5; // Push them slightly back

            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);

            // Physics/Interaction variables stored in userData
            mesh.userData = {
                originalPosition: mesh.position.clone(),
                velocity: new THREE.Vector3(0,0,0),
                angularVelocity: new THREE.Vector3(Math.random()*0.02-0.01, Math.random()*0.02-0.01, Math.random()*0.02-0.01),
                isDragging: false,
                mass: 0.8 + Math.random() * 0.5
            };

            scene.add(mesh);
            shapes.push(mesh);
        }

        // --- INTERACTION LOGIC ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isPointerDown = false;
        let previousMousePosition = { x: 0, y: 0 };
        
        // Variables for throwing/dragging shapes
        let draggedObject = null;
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const intersectPoint = new THREE.Vector3();

        // Variables for rotating main model
        let isRotatingMain = false;
        let targetMainRotation = { x: 0, y: 0 };
        let currentMainRotation = { x: 0, y: 0 };

        window.addEventListener('pointerdown', (event) => {
            isPointerDown = true;
            previousMousePosition = { x: event.clientX, y: event.clientY };

            // Update mouse coordinates for raycaster
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Check if we clicked an abstract shape
            const intersects = raycaster.intersectObjects(shapes);
            if (intersects.length > 0) {
                draggedObject = intersects[0].object;
                draggedObject.userData.isDragging = true;
                draggedObject.userData.velocity.set(0,0,0); // Stop current movement
                
                // Create an invisible plane at the object's depth for dragging
                dragPlane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(dragPlane.normal), draggedObject.position);
            } else {
                // If clicked empty space or the main model, rotate the main model
                isRotatingMain = true;
            }
        });

        window.addEventListener('pointermove', (event) => {
            // Update Background Gradient
            const bgX = (event.clientX / window.innerWidth) * 100;
            const bgY = (event.clientY / window.innerHeight) * 100;
            document.body.style.background = `radial-gradient(circle at ${bgX}% ${bgY}%, #2b1845 0%, #0a0510 100%)`;

            // Normalized mouse for parallax and raycasting
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            if (!isPointerDown) return;

            const deltaMove = {
                x: event.clientX - previousMousePosition.x,
                y: event.clientY - previousMousePosition.y
            };

            if (draggedObject) {
                // Handle throwing physics
                raycaster.setFromCamera(mouse, camera);
                raycaster.ray.intersectPlane(dragPlane, intersectPoint);
                
                // Calculate velocity based on drag distance (for throwing)
                draggedObject.userData.velocity.subVectors(intersectPoint, draggedObject.position).multiplyScalar(0.2);
                draggedObject.position.copy(intersectPoint);
                
            } else if (isRotatingMain) {
                // Handle manual rotation of central model
                targetMainRotation.y += deltaMove.x * 0.01;
                targetMainRotation.x += deltaMove.y * 0.01;
            }

            previousMousePosition = { x: event.clientX, y: event.clientY };
        });

        window.addEventListener('pointerup', () => {
            isPointerDown = false;
            isRotatingMain = false;
            if (draggedObject) {
                draggedObject.userData.isDragging = false;
                draggedObject = null;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // 1. Intro Animation (Rotate in and scale up)
            if (isIntroPlaying) {
                introProgress += delta * 0.8; // Speed of intro
                if (introProgress >= 1) {
                    introProgress = 1;
                    isIntroPlaying = false;
                }
                // Ease out elastic or cubic
                const ease = 1 - Math.pow(1 - introProgress, 3);
                mainGroup.scale.set(ease, ease, ease);
                
                // Rapid spin during intro
                mainGroup.rotation.y = (1 - ease) * Math.PI * 4; 
                mainGroup.rotation.z = (1 - ease) * Math.PI;
            }

            // 2. Central Model Rotation Logic
            if (!isIntroPlaying) {
                // Smoothly lerp manual rotation
                currentMainRotation.x += (targetMainRotation.x - currentMainRotation.x) * 0.1;
                currentMainRotation.y += (targetMainRotation.y - currentMainRotation.y) * 0.1;
                
                // Add continuous slow auto-rotation
                targetMainRotation.y += 0.002; 

                mainGroup.rotation.y = currentMainRotation.y;
                mainGroup.rotation.x = currentMainRotation.x;
            }

            // 3. Smooth Camera Parallax based on cursor
            camera.position.x += (mouse.x * 2 - camera.position.x) * 0.05;
            camera.position.y += (mouse.y * 2 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            // 4. Abstract Shapes Physics (Spring + Floating)
            const springStrength = 0.05;
            const damping = 0.85; // Friction

            shapes.forEach(shape => {
                const data = shape.userData;

                if (!data.isDragging) {
                    // Apply spring force towards original position
                    const forceX = (data.originalPosition.x - shape.position.x) * springStrength;
                    const forceY = (data.originalPosition.y - shape.position.y) * springStrength;
                    const forceZ = (data.originalPosition.z - shape.position.z) * springStrength;

                    data.velocity.x += forceX / data.mass;
                    data.velocity.y += forceY / data.mass;
                    data.velocity.z += forceZ / data.mass;

                    // Apply damping (friction)
                    data.velocity.multiplyScalar(damping);

                    // Add a tiny bit of continuous organic floating movement
                    shape.position.y += Math.sin(time * 2 + data.originalPosition.x) * 0.005;

                    // Update position
                    shape.position.add(data.velocity);
                }

                // Continuous rotation
                shape.rotation.x += data.angularVelocity.x;
                shape.rotation.y += data.angularVelocity.y;
                shape.rotation.z += data.angularVelocity.z;
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
